<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQ Admin | Hospital Management</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --surface-glass: rgba(30, 41, 59, 0.8);
      --accent-cyan: #06b6d4;
      --risk-critical: #ef4444;
      --text-primary: #f1f5f9;
    }
    body {
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 250px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(6, 182, 212, 0.3);
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-cyan);
      letter-spacing: -0.5px;
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-item {
      padding: 1rem;
      color: #94a3b8;
      text-decoration: none;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
      box-shadow: inset 4px 0 0 var(--accent-cyan);
    }
    .main-content {
      flex: 1;
      padding: 3rem;
      overflow-y: auto;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { color: #94a3b8; text-transform: uppercase; font-size: 0.9em; }
    .btn {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14,165,233,0.4); }
  </style>

    <!-- Google Translate -->
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ar,en,fr,es,ur,hi,zh-CN,de,tr,ru,id,ms,fa,bn,pt',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <style>
        #translate-bar {
            position: fixed; top: 12px; right: 16px; z-index: 9100;
            background: rgba(15,23,42,0.9); backdrop-filter: blur(14px);
            border: 1px solid rgba(6,182,212,0.35); border-radius: 30px;
            padding: 5px 14px; display: flex; align-items: center; gap: 8px;
            font-family: 'Outfit', sans-serif; font-size: 0.8rem; color: #94a3b8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #translate-bar i { color: #06b6d4; font-size: 0.95rem; }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; font-size: 0.8rem !important; padding: 0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value span { color: #e2e8f0 !important; }
        .goog-te-gadget-simple a, .goog-te-gadget-simple a:visited { color: #e2e8f0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value { color: #e2e8f0 !important; }
        .goog-te-gadget-simple img { display: none !important; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div id="translate-bar">
        <i class="fa-solid fa-language"></i>
        <div id="google_translate_element"></div>
    </div>

  <div class="sidebar">
    <div class="logo">
      <i class="fa-solid fa-heart-pulse"></i> ResQ Admin
    </div>
    <a href="#" class="nav-item active"><i class="fa-solid fa-hospital"></i> Hospitals</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Users</a>
    <a href="/" class="nav-item" style="margin-top:auto;"><i class="fa-solid fa-arrow-left"></i> Exit Admin</a>
  </div>

  <div class="main-content">
    <h2 style="font-size: 2rem; margin-bottom: 2rem;">Hospital Network Management</h2>
    
    <div class="glass-panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Registered Hospitals</h3>
        <button class="btn"><i class="fa-solid fa-plus"></i> Add Hospital</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Hospital Name</th>
            <th>Location (Lat, Lng)</th>
            <th>Available Beds</th>
            <th>Total Capacity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for h in hospitals %}
          <tr>
            <td>{{ h.id }}</td>
            <td style="font-weight:bold;">{{ h.name }}</td>
            <td style="font-family:monospace; color:#cbd5e1;">{{ h.lat }}, {{ h.lng }}</td>
            <td><span style="color:#22c55e; font-weight:bold;">{{ h.available_beds }}</span></td>
            <td>{{ h.capacity }}</td>
            <td>
              <button style="background:transparent; border:none; color:var(--accent-cyan); cursor:pointer;"><i class="fa-solid fa-pen"></i></button>
              <button style="background:transparent; border:none; color:var(--risk-critical); cursor:pointer; margin-left:10px;"><i class="fa-solid fa-trash"></i></button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
