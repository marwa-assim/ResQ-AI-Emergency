<!DOCTYPE html>
<html>
<head>
    <title>ER Rapid Triage</title>

    <!-- Google Translate -->
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ar,en,fr,es,ur,hi,zh-CN,de,tr,ru,id,ms,fa,bn,pt',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <style>
        #translate-bar {
            position: fixed; top: 12px; right: 16px; z-index: 9100;
            background: rgba(15,23,42,0.9); backdrop-filter: blur(14px);
            border: 1px solid rgba(6,182,212,0.35); border-radius: 30px;
            padding: 5px 14px; display: flex; align-items: center; gap: 8px;
            font-family: 'Outfit', sans-serif; font-size: 0.8rem; color: #94a3b8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #translate-bar i { color: #06b6d4; font-size: 0.95rem; }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; font-size: 0.8rem !important; padding: 0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value span { color: #e2e8f0 !important; }
        .goog-te-gadget-simple a, .goog-te-gadget-simple a:visited { color: #e2e8f0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value { color: #e2e8f0 !important; }
        .goog-te-gadget-simple img { display: none !important; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div id="translate-bar">
        <i class="fa-solid fa-language"></i>
        <div id="google_translate_element"></div>
    </div>

<h2>ER Rapid Triage</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}


<form method="post">

  <label>National ID / CPR:</label><br>
  <input type="text" name="patient_id" required><br><br>

  <label>Age:</label><br>
  <input type="number" name="age" required><br><br>

  <label>Arrival Mode:</label><br>
  <select name="arrival_mode">
    <option value="0">Walk-in</option>
    <option value="1">Family</option>
    <option value="2">Ambulance</option>
  </select><br><br>

  <input type="checkbox" name="chest_pain"> Chest Pain<br>
  <input type="checkbox" name="breathing"> Breathing Difficulty<br>
  <input type="checkbox" name="bleeding"> Bleeding<br>
  <input type="checkbox" name="fainting"> Fainting<br>
  <input type="checkbox" name="chronic"> Chronic Disease<br>
  <input type="checkbox" name="allergy"> Allergy Risk<br>

  <hr>
    <!-- removed demo override --><br><br>

  <button type="submit">Triage Patient</button>

</form>

</body>
</html>
