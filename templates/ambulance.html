<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Companion</title>
    <!-- Google Fonts: Roboto for Material 3 -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* MATERIAL 3 THEME TOKENS */
        :root {
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-primary-container: #0842a0;
            --md-sys-color-on-primary-container: #d6e3ff;
            --md-sys-color-background: #111318;
            --md-sys-color-surface: #1e293b;
            --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-error: #ffb4ab;
            --md-sys-color-outline: #8e9099;
            --md-elevation-2: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* CENTERED CONTAINER (Not Full Width) */
        .app-shell {
            width: 100%;
            max-width: 500px;
            /* Mobile width */
            display: flex;
            flex-direction: column;
            flex: 1;
            background: var(--md-sys-color-surface);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            /* Make it look like an app */
        }

        /* HEADER */
        .top-app-bar {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0b0f19;
            border-bottom: 1px solid #333;
        }

        .status-chip {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* MAIN CONTENT */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
            overflow-y: auto;
        }

        /* CARDS */
        .card {
            background: #2b3240;
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--md-elevation-2);
            border: 1px solid #374151;
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 12px;
        }

        /* MAP CONTAINER */
        .map-container {
            height: 250px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #444;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* BUTTONS (Material 3 Style) */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-filled {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .btn-tonal {
            background: #334155;
            color: #e2e2e6;
        }

        .btn-error {
            background: #ef4444;
            color: white;
        }

        .btn-success {
            background: #22c55e;
            color: #000;
        }

        /* INPUTS */
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: #111318;
            border: 1px solid #475569;
            color: white;
            border-radius: 8px;
            margin-bottom: 12px;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--md-sys-color-primary);
            outline: none;
        }

        /* ALARM OVERLAY */
        .alarm-curtain {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: flash 1s infinite alternate;
        }

        @keyframes flash {
            from {
                box-shadow: inset 0 0 0 0 red;
            }

            to {
                box-shadow: inset 0 0 50px 0 red;
            }
        }

        /* FAB (Floating Action Button) for Map */
        .fab {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }
    </style>

    <!-- Google Translate -->

                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,

    <script>
        const UNIT_ID = "UNIT-42";
        let currentState = "IDLE";
        let audioContext = null;
        let currentMission = null;
        let availableHospitals = [];

        // --- REAL POLLING ---
        // Poll every 2 seconds for new dispatch
        setInterval(checkDispatch, 2000);

        async function checkDispatch() {
            if (currentState !== 'IDLE') return; // Only listen if Idle
            try {
                const res = await axios.get('/api/ambulance/check_dispatch');
                if (res.data.dispatch) {
                    console.log("Dispatch Received:", res.data.mission);
                    showAlarm(res.data.mission);
                }
            } catch (e) { console.error("Polling error", e); }
        }

        function playAlarmSound() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioContext.currentTime); // A4
            osc.frequency.setValueAtTime(880, audioContext.currentTime + 0.5); // A5

            gain.gain.setValueAtTime(0.5, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);

            osc.start();
            osc.stop(audioContext.currentTime + 1);
        }

        function showAlarm(mission) {
            if (currentState !== 'IDLE') return;
            if (window.currentAlarmInterval) return; // Prevent overlapping alarms

            currentMission = mission;
            const txt = document.querySelector('#alarm-layer p');
            if (txt && mission) txt.innerText = "LAT: " + mission.lat.toFixed(4) + " LNG: " + mission.lng.toFixed(4) + "\n" + (mission.symptoms || "EMERGENCY DISPATCH");
            document.getElementById('alarm-layer').style.display = 'flex';

            // Play Loop
            window.currentAlarmInterval = setInterval(playAlarmSound, 1000);
        }

        function acceptAlarm() {
            document.getElementById('alarm-layer').style.display = 'none';
            if (window.currentAlarmInterval) {
                clearInterval(window.currentAlarmInterval);
                window.currentAlarmInterval = null;
            }

            currentState = "NAV_PATIENT";
            synchStatus("RESPONDING", "En Route to Scene", "Target Location");
            renderState();

            // Real Production Ambulance Geolocation Tracking
            if (navigator.geolocation) {
                window.ambulanceGeoWatcher = navigator.geolocation.watchPosition(
                    (position) => {
                        if (currentState === 'NAV_PATIENT' || currentState === 'NAV_HOSPITAL') {
                            synchLocation(position.coords.latitude, position.coords.longitude);
                        }
                    },
                    (error) => console.warn("GPS Tracking Error:", error),
                    { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
                );
            } else {
                console.error("Geolocation is not supported by this browser.");
            }
        }

        async function synchLocation(lat, lng) {
            try {
                await axios.post('/api/ambulance/update', {
                    id: currentMission.id,
                    status: currentState === 'NAV_PATIENT' ? 'RESPONDING' : 'TRANSPORTING',
                    lat: lat,
                    lng: lng
                });
            } catch (e) { }
        }

        async function synchStatus(status, details, dest, hosp_id=null) {
            try {
                let payload = {
                    id: currentMission.id,
                    status: status,
                    symptoms: details,
                    destination: dest
                };
                if (hosp_id) payload.hospital_id = hosp_id;
                
                await axios.post('/api/ambulance/update', payload);
            } catch (e) { console.error("Sync Error", e); }
        }

        // --- OSRM REAL ROAD ROUTING ---
        async function fetchOsrmRoute(fromLat, fromLng, toLat, toLng) {
            try {
                const res = await axios.post('/api/route', {
                    start_lat: fromLat, start_lng: fromLng,
                    end_lat: toLat,   end_lng: toLng
                });
                return res.data; // { duration_minutes, distance_km, steps[] }
            } catch(e) {
                console.warn('OSRM unavailable, using estimate', e);
                // Rough estimate fallback
                const dlat = toLat - fromLat, dlng = toLng - fromLng;
                const km = Math.sqrt(dlat*dlat + dlng*dlng) * 111;
                return { duration_minutes: Math.max(1, Math.round(km/0.8)), distance_km: Math.round(km*10)/10, steps: [], source:'fallback' };
            }
        }

        // --- RENDERER ---
        async function renderState() {
            const c = document.getElementById('main-content');
            c.innerHTML = '';

            if (currentState === 'NAV_PATIENT') {
                c.innerHTML = `
                    <div class="modern-card">
                        <div class="card-header">🚑 Navigation — En Route to Patient</div>
                        <div class="map-container">
                            <iframe width="100%" height="100%" style="border:0" loading="lazy" allowfullscreen
                                src="https://maps.google.com/maps?q=${currentMission.lat},${currentMission.lng}&t=&z=15&ie=UTF8&iwloc=&output=embed">
                            </iframe>
                            <div class="fab" onclick="window.open('https://maps.google.com/?q=${currentMission.lat},${currentMission.lng}', '_blank')">
                                <i class="fa-solid fa-diamond-turn-right"></i>
                            </div>
                        </div>
                        <div id="route-info" style="margin-top:12px;">
                            <div style="color:#64748b;font-size:0.85rem;">Calculating route via OSRM...</div>
                        </div>
                    </div>
                    <button class="btn btn-success" onclick="stateArrivedScene()">
                        <i class="fa-solid fa-location-dot"></i> Arrived at Scene
                    </button>
                `;
                // Fetch real route async after render
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async pos => {
                        const route = await fetchOsrmRoute(pos.coords.latitude, pos.coords.longitude, currentMission.lat, currentMission.lng);
                        const el = document.getElementById('route-info');
                        if (el) {
                            const stepsHtml = (route.steps||[]).slice(0,4).map(s=>`<li style="color:#94a3b8;font-size:0.78rem;margin:3px 0">${s}</li>`).join('');
                            el.innerHTML = `
                                <div style="display:flex;gap:16px;margin-bottom:8px;">
                                    <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#4ade80">${route.duration_minutes}m</div><div style="font-size:0.7rem;color:#64748b">ETA</div></div>
                                    <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#06b6d4">${route.distance_km}km</div><div style="font-size:0.7rem;color:#64748b">Via Road</div></div>
                                </div>
                                ${stepsHtml ? '<div style="font-size:0.75rem;color:#64748b;margin-bottom:4px;">TURN-BY-TURN</div><ul style="padding-left:1.2rem;margin:0;">' + stepsHtml + '</ul>' : ''}
                            `;
                        }
                    }, () => {
                        const el = document.getElementById('route-info');
                        if (el) el.innerHTML = `<div style="color:#64748b;font-size:0.8rem;">Target: ${currentMission.lat.toFixed(4)}, ${currentMission.lng.toFixed(4)}</div>`;
                    });
                }
            }
            else if (currentState === 'ON_SCENE') {
                let hospHtml = availableHospitals.map(h => `
                    <button class="btn btn-tonal" style="justify-content:space-between; margin-bottom:8px;" onclick="selectHosp('${h.name}', ${h.id}, ${h.lat}, ${h.lng})">
                        <span>${h.name}</span>
                        <span style="color:#4ade80;">${h._eta ? h._eta + 'm · ' + h._dist + 'km' : 'ETA...'}</span>
                    </button>
                `).join('');

                c.innerHTML = `
                   <div class="modern-card">
                        <div class="card-header">Patient Assessment</div>
                        <p style="font-size:0.9rem; color:#aaa;">Stabilize patient and select destination.</p>
                   </div>
                   <div class="modern-card delay-1">
                        <div class="card-header">Select Hospital</div>
                        ${hospHtml}
                   </div>
                `;
            }
            else if (currentState === 'NAV_HOSPITAL') {
                c.innerHTML = `
                    <div class="modern-card">
                        <div class="card-header">🏥 Navigation — En Route to ${currentMission.hospital_name}</div>
                        <div class="map-container">
                            <iframe width="100%" height="100%" style="border:0" loading="lazy" allowfullscreen
                                src="https://maps.google.com/maps?q=${currentMission.hospital_lat},${currentMission.hospital_lng}&t=&z=14&ie=UTF8&iwloc=&output=embed">
                            </iframe>
                            <div class="fab" onclick="window.open('https://maps.google.com/?q=${currentMission.hospital_lat},${currentMission.hospital_lng}', '_blank')">
                                <i class="fa-solid fa-diamond-turn-right"></i>
                            </div>
                        </div>
                        <div id="hosp-route-info" style="margin-top:8px;">
                            <div style="color:#64748b;font-size:0.85rem;">Calculating route to hospital...</div>
                        </div>
                        <button class="btn btn-tonal" style="margin-top:12px;" onclick="activateGreenWave(this)">
                            <i class="fa-solid fa-traffic-light"></i> Activate Green Wave
                        </button>
                    </div>
                    <button class="btn btn-filled" onclick="stateReporting()">
                        <i class="fa-solid fa-file-medical"></i> Prepare Handoff Report
                    </button>
                `;
                // Fetch OSRM route from patient scene → hospital
                const route = await fetchOsrmRoute(currentMission.lat, currentMission.lng, currentMission.hospital_lat, currentMission.hospital_lng);
                const el = document.getElementById('hosp-route-info');
                if (el) {
                    const stepsHtml = (route.steps||[]).slice(0,4).map(s=>`<li style="color:#94a3b8;font-size:0.78rem;margin:3px 0">${s}</li>`).join('');
                    el.innerHTML = `
                        <div style="display:flex;gap:16px;margin-bottom:8px;">
                            <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#f59e0b">${route.duration_minutes}m</div><div style="font-size:0.7rem;color:#64748b">ETA to ER</div></div>
                            <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#06b6d4">${route.distance_km}km</div><div style="font-size:0.7rem;color:#64748b">Via Road</div></div>
                        </div>
                        ${stepsHtml ? '<div style="font-size:0.75rem;color:#64748b;margin-bottom:4px;">TURN-BY-TURN</div><ul style="padding-left:1.2rem;margin:0;">' + stepsHtml + '</ul>' : ''}
                    `;
                }
            }
            else if (currentState === 'REPORTING') {
                c.innerHTML = `
                    <div class="modern-card">
                        <div class="card-header">Patient Vitals & Handoff</div>

                        <label style="font-size:0.8rem; color:#aaa;">Patient Name</label>
                        <input type="text" id="p-name" placeholder="Unknown">

                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <div>
                                <label style="font-size:0.8rem; color:#aaa;">HR (bpm)</label>
                                <input type="number" id="p-hr" value="95">
                            </div>
                            <div>
                                <label style="font-size:0.8rem; color:#aaa;">SpO2 (%)</label>
                                <input type="number" id="p-spo2" value="96">
                            </div>
                        </div>

                        <label style="font-size:0.8rem; color:#aaa;">Symptoms (Select all that apply)</label>
                        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px;">
                            <label style="display:flex; align-items:center; gap:10px; background:#111318; padding:10px; border-radius:8px;">
                                <input type="checkbox" name="sym" value="Chest Pain" style="width:20px; margin:0;"> Chest Pain
                            </label>
                            <label style="display:flex; align-items:center; gap:10px; background:#111318; padding:10px; border-radius:8px;">
                                <input type="checkbox" name="sym" value="Shortness of Breath" style="width:20px; margin:0;"> Shortness of Breath
                            </label>
                            <label style="display:flex; align-items:center; gap:10px; background:#111318; padding:10px; border-radius:8px;">
                                <input type="checkbox" name="sym" value="Severe Bleeding" style="width:20px; margin:0;"> Severe Bleeding
                            </label>
                             <label style="display:flex; align-items:center; gap:10px; background:#111318; padding:10px; border-radius:8px;">
                                <input type="checkbox" name="sym" value="Unconscious" style="width:20px; margin:0;"> Unconscious
                            </label>
                        </div>

                        <input type="text" id="p-other" placeholder="Other Notes...">

                        <button class="btn btn-filled" onclick="transmitData()">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Transmit Data
                        </button>
                    </div>

                    <div id="arrival-area" style="opacity:0.5; pointer-events:none;">
                         <button class="btn btn-success" onclick="markArrived()">
                             <i class="fa-solid fa-check-double"></i> Arrived at ER
                         </button>
                    </div>
                `;
            }
            else if (currentState === 'COMPLETE') {
                c.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px;">
                        <i class="fa-solid fa-circle-check" style="font-size:3rem; color:#4ade80; margin-bottom:1rem;"></i>
                        <h2 style="margin:0;">Mission Complete</h2>
                        <p>Patient transferred to ER Queue.</p>
                        <button class="btn btn-tonal" style="width:200px; margin-top:20px;" onclick="location.reload()">Reset</button>
                    </div>
                `;
            }
        }

        // --- ACTIONS ---
        async function stateArrivedScene() {
            try {
                const res = await axios.get('/api/hospitals');
                availableHospitals = res.data;
                // Pre-calculate real OSRM ETAs for each hospital from patient location
                for (const h of availableHospitals) {
                    try {
                        const r = await fetchOsrmRoute(currentMission.lat, currentMission.lng, h.lat, h.lng);
                        h._eta  = r.duration_minutes;
                        h._dist = r.distance_km;
                    } catch(e) { h._eta = '?'; h._dist = ''; }
                }
            } catch (e) {
                console.error("Could not fetch hospitals:", e);
                availableHospitals = [{id:1, name:"Salmaniya Medical", lat:26.2137, lng:50.5794, _eta:'~8', _dist:''}];
            }
            currentState = 'ON_SCENE';
            synchStatus("ON_SCENE", "Treating Patient", "");
            renderState();
        }

        function selectHosp(name, id, lat, lng) {
            currentMission.hospital_name = name;
            currentMission.hospital_id = id;
            currentMission.hospital_lat = lat;
            currentMission.hospital_lng = lng;
            currentState = 'NAV_HOSPITAL';
            synchStatus("TRANSPORTING", "En Route to ER", name, id);
            renderState();
        }

        function activateGreenWave(btn) {
            btn.style.background = '#22c55e'; // Green
            btn.style.color = 'black';
            btn.innerHTML = '<i class="fa-solid fa-wifi"></i> Green Wave Active';
            document.getElementById('v2x-chip').style.background = '#22c55e';
            document.getElementById('v2x-chip').style.color = '#000';
            document.getElementById('v2x-chip').innerHTML = '<i class="fa-solid fa-wifi"></i> PRIORITY';
        }

        function stateReporting() {
            currentState = 'REPORTING';
            renderState();
        }

        async function transmitData() {
            // Collect Checkboxes
            const checkboxes = document.querySelectorAll('input[name="sym"]:checked');
            let symptoms = Array.from(checkboxes).map(cb => cb.value);
            const other = document.getElementById('p-other').value;
            if (other) symptoms.push(other);

            const p = {
                id: document.getElementById('p-name').value || currentMission.id,
                name: document.getElementById('p-name').value || "Trauma Patient",
                vitals: { hr: document.getElementById('p-hr').value, spo2: document.getElementById('p-spo2').value },
                symptoms: symptoms.join(", "), // Send as string for now, but backend will parse
                checklist: symptoms, // Send array too
                status: "HEADS UP"
            };

            try {
                const button = document.querySelector('.btn-filled');
                button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
                
                // Keep patient ID synced
                p.id = currentMission.id;
                await axios.post('/api/ambulance/new', p);

                button.innerHTML = '<i class="fa-solid fa-check"></i> Sent';
                button.disabled = true;

                // Enable Arrival
                const arr = document.getElementById('arrival-area');
                arr.style.opacity = '1';
                arr.style.pointerEvents = 'all';

            } catch (e) { alert("Transmit Failed: " + e.message); }
        }

        async function markArrived() {
            try {
                if (window.ambulanceGeoWatcher) navigator.geolocation.clearWatch(window.ambulanceGeoWatcher);
                await axios.post('/api/ambulance/arrive', { id: currentMission.id });
                currentState = 'COMPLETE';
                renderState();
            } catch (e) { alert("Arrival Error: " + e.message); }
        }

    </script>
    <script>
        // Particle Network Animation
        const canvas = document.getElementById('bg-canvas');
        if(canvas) {
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const particleCount = 60; // Slightly less for performance on mobile
            const connectionDistance = 120;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2 + 1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.fillStyle = 'rgba(6, 182, 212, 0.4)'; // Cyan
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = 'rgba(6, 182, 212, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < particles.length; i++) {
                    let p1 = particles[i];
                    p1.update();
                    p1.draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dist = Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
