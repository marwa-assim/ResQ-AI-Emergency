<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ AI - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_glass.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Google Translate -->
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ar,en,fr,es,ur,hi,zh-CN,de,tr,ru,id,ms,fa,bn,pt',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <style>
        #translate-bar {
            position: fixed; top: 12px; right: 16px; z-index: 9100;
            background: rgba(15,23,42,0.9); backdrop-filter: blur(14px);
            border: 1px solid rgba(6,182,212,0.35); border-radius: 30px;
            padding: 5px 14px; display: flex; align-items: center; gap: 8px;
            font-family: 'Outfit', sans-serif; font-size: 0.8rem; color: #94a3b8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #translate-bar i { color: #06b6d4; font-size: 0.95rem; }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; font-size: 0.8rem !important; padding: 0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value span { color: #e2e8f0 !important; }
        .goog-te-gadget-simple a, .goog-te-gadget-simple a:visited { color: #e2e8f0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value { color: #e2e8f0 !important; }
        .goog-te-gadget-simple img { display: none !important; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>

<body>
    <!-- Language Switcher -->
    <div id="translate-bar">
        <i class="fa-solid fa-language"></i>
        <div id="google_translate_element"></div>
    </div>
    <div class="glass-container">
        <h1 class="logo">Join ResQ</h1>
        <p class="subtitle">Next-Gen Emergency Triage</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/signup">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" name="name" id="name" placeholder="Dr. Sarah Ahmed" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="name@hospital.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Create a strong password" required>
            </div>

            <div class="input-group">
                <label for="role">Account Role</label>
                <select name="role" id="role" required style="width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); color: white; border-radius: 8px;">
                    <option value="patient">Patient / User</option>
                    <option value="ambulance">Ambulance Team</option>
                    <option value="volunteer">Volunteer Responder</option>
                    <option value="doctor">Hospital Admin / Doctor</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/login">Sign In</a></p>
        </div>
    </div>
</body>

</html>
