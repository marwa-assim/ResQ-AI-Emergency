<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ AI Triage</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0b0c15">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=2) }}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Google Translate – Option A (full page translation, 100+ languages) -->
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ar,en,fr,es,ur,hi,zh-CN,de,tr,ru,id,ms,fa,bn,pt',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>

    <style>
        #translate-bar {
            position: fixed; top: 12px; right: 16px; z-index: 9100;
            background: rgba(15,23,42,0.9); backdrop-filter: blur(14px);
            border: 1px solid rgba(6,182,212,0.35); border-radius: 30px;
            padding: 5px 14px; display: flex; align-items: center; gap: 8px;
            font-family: 'Outfit', sans-serif; font-size: 0.8rem; color: #94a3b8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #translate-bar i { color: #06b6d4; font-size: 0.95rem; }
        .goog-te-gadget-simple {
            background: transparent !important; border: none !important;
            font-size: 0.8rem !important; padding: 0 !important;
        }
        .goog-te-gadget-simple .goog-te-menu-value span { color: #e2e8f0 !important; }
        .goog-te-gadget-simple a, .goog-te-gadget-simple a:visited { color: #e2e8f0 !important; }
        .goog-te-gadget-simple .goog-te-menu-value { color: #e2e8f0 !important; }
        .goog-te-gadget-simple img { display: none !important; }
        .goog-te-banner-frame, .skiptranslate > font { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>

<body>
    <!-- Language Switcher (top-right corner) -->
    <div id="translate-bar">
        <i class="fa-solid fa-language"></i>
        <div id="google_translate_element"></div>
    </div>

    <div class="app-wrapper">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW Registered!', reg.scope))
                    .catch(err => console.log('SW Failed:', err));
            });
        }
    </script>
</body>
</html>
